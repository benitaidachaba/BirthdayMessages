
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #bday-app {
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: 'Jost', sans-serif;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1045 50%, #1a0a2e 100%);
    border-radius: 20px;
    padding: 40px 20px;
  }

  #canvas-confetti {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* PHASE 1: teaser */
  #phase-teaser {
    text-align: center;
    z-index: 2;
  }

  #phase-teaser .hint {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c9a96e;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  #phase-teaser h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 400;
    color: #f5e6ff;
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  #phase-teaser h1 em {
    font-style: italic;
    color: #c9a96e;
  }

  #phase-teaser .subtext {
    font-size: 13px;
    color: rgba(245,230,255,0.45);
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  /* RUNAWAY BUTTON */
  #run-btn {
    position: relative;
    display: inline-block;
    padding: 14px 40px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1a0a2e;
    background: #c9a96e;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.08s ease;
    z-index: 5;
  }

  #run-btn:hover {
    transform: scale(1.02);
  }

  #catch-msg {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(201,169,110,0.5);
    height: 16px;
    transition: opacity 0.3s;
    text-transform: uppercase;
  }

  /* PHASE 2: birthday reveal */
  #phase-reveal {
    display: none;
    text-align: center;
    z-index: 2;
    animation: fadeUp 1.2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #phase-reveal .label {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #c9a96e;
    margin-bottom: 24px;
    opacity: 0.8;
  }

  #phase-reveal .big-hbd {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 8vw, 64px);
    font-weight: 400;
    color: #f5e6ff;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  #phase-reveal .big-hbd em {
    font-style: italic;
    color: #c9a96e;
    display: block;
    font-size: 0.9em;
  }

  #phase-reveal .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 500;
    color: #f5e6ff;
    letter-spacing: 3px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  #phase-reveal .divider {
    width: 60px;
    height: 1px;
    background: #c9a96e;
    margin: 0 auto 24px;
    opacity: 0.6;
  }

  #phase-reveal .message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(245,230,255,0.7);
    line-height: 1.7;
    max-width: 360px;
    margin: 0 auto 32px;
  }

  #phase-reveal .orbs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }

  .orb {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c9a96e;
    opacity: 0.4;
    animation: pulse 2s ease-in-out infinite;
  }

  .orb:nth-child(2) { animation-delay: 0.3s; background: #d4a0f0; }
  .orb:nth-child(3) { animation-delay: 0.6s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.5); opacity: 0.8; }
  }

  /* floating stars bg */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.9; }
  }
</style>

<div id="bday-app">
  <canvas id="canvas-confetti"></canvas>

  <!-- bg stars -->
  <div id="stars-bg"></div>

  <!-- PHASE 1 -->
  <div id="phase-teaser">
    <p class="hint">a little something awaits</p>
    <h1>Something <em>wonderful</em><br>is waiting for you</h1>
    <p class="subtext">if you dare to click the button</p>
    <button id="run-btn" onclick="tryClick()">Reveal the magic</button>
    <p id="catch-msg"></p>
  </div>

  <!-- PHASE 2 -->
  <div id="phase-reveal">
    <p class="label">today is a special day</p>
    <div class="big-hbd">Happy <em>Birthday</em></div>
    <div class="name">Ugochukwu Okafor</div>
    <div class="divider"></div>
    <p class="message">May this day and every day that follows be filled with everything that makes your heart full.</p>
    <div class="orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>
  </div>
</div>

<script>
(function() {
  const btn = document.getElementById('run-btn');
  const msg = document.getElementById('catch-msg');
  const app = document.getElementById('bday-app');

  let attempts = 0;
  let revealed = false;

  const msgs = [
    'nice try...',
    'not so fast!',
    'almost got it...',
    'you\'re quick!',
    'one more try...',
    'okay... ready?'
  ];

  // generate stars
  const starsBg = document.getElementById('stars-bg');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    app.appendChild(s);
  }

  window.tryClick = function() {
    if (revealed) return;
    attempts++;

    if (attempts >= 6) {
      reveal();
      return;
    }

    msg.textContent = msgs[attempts - 1];

    const appRect = app.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    const maxX = appRect.width - btnRect.width - 20;
    const maxY = appRect.height - btnRect.height - 20;

    const randX = Math.floor(Math.random() * maxX);
    const randY = Math.floor(Math.random() * maxY);

    btn.style.position = 'absolute';
    btn.style.left = randX + 'px';
    btn.style.top = randY + 'px';
    btn.style.transition = 'left 0.3s cubic-bezier(0.34,1.56,0.64,1), top 0.3s cubic-bezier(0.34,1.56,0.64,1)';
  };

  // mouseover flee
  btn.addEventListener('mousemove', function(e) {
    if (revealed || attempts >= 5) return;
    const appRect = app.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    const maxX = appRect.width - btnRect.width - 20;
    const maxY = appRect.height - btnRect.height - 20;
    const randX = Math.floor(Math.random() * maxX);
    const randY = Math.floor(Math.random() * maxY);
    btn.style.position = 'absolute';
    btn.style.left = randX + 'px';
    btn.style.top = randY + 'px';
    btn.style.transition = 'left 0.25s ease, top 0.25s ease';
    if (attempts < msgs.length) {
      msg.textContent = msgs[attempts] || 'almost!';
    }
  });

  function reveal() {
    revealed = true;
    document.getElementById('phase-teaser').style.display = 'none';
    const rev = document.getElementById('phase-reveal');
    rev.style.display = 'block';
    launchConfetti();
    setTimeout(launchConfetti, 1200);
    setTimeout(launchConfetti, 2500);
  }

  function launchConfetti() {
    const canvas = document.getElementById('canvas-confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;

    const colors = ['#c9a96e','#d4a0f0','#f5e6ff','#9b59b6','#f0c040','#e8a0bf'];
    const pieces = [];

    for (let i = 0; i < 80; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 100,
        w: 5 + Math.random() * 8,
        h: 3 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 3,
        vy: 2 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.15,
        alpha: 1
      });
    }

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
        if (p.alpha > 0) {
          alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
      });
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }
})();
</script>
